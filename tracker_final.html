<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>📊 Tracker Candidatura</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f5f5f5; }
        
        .container { display: flex; flex-direction: column; height: 100vh; }
        
        .header { background: linear-gradient(135deg, #1F4E78 0%, #2E5FA3 100%); color: white; padding: 12px; flex-shrink: 0; }
        .header h1 { font-size: 20px; margin-bottom: 8px; }
        .header-info { font-size: 11px; opacity: 0.9; }
        
        .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-top: 8px; }
        .stat-box { background: rgba(255,255,255,0.2); padding: 8px; border-radius: 6px; text-align: center; font-size: 12px; }
        .stat-number { font-size: 20px; font-weight: bold; }
        
        .toolbar { padding: 10px; background: white; border-bottom: 1px solid #ddd; flex-shrink: 0; }
        .search-box { width: 100%; padding: 10px; border: 2px solid #ddd; border-radius: 6px; font-size: 14px; margin-bottom: 8px; }
        .search-box:focus { outline: none; border-color: #1F4E78; background: #f0f5ff; }
        
        .button-row { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 6px; margin-bottom: 8px; }
        .btn { padding: 10px; border: none; border-radius: 4px; font-size: 12px; font-weight: 600; color: white; cursor: pointer; }
        .btn-nuevo { background: #00B050; }
        .btn-import { background: #9966CC; }
        .btn-excel { background: #4472C4; }
        .btn-filters { background: #FF9800; }
        .btn-filters.active { background: #F57C00; }
        
        .save-indicator { font-size: 11px; color: #666; padding: 4px 8px; background: #e8f5e9; border-radius: 4px; display: inline-block; }
        .save-indicator.saving { background: #fff3e0; color: #e65100; }
        
        .filters-panel { 
            max-height: 0; 
            overflow: hidden; 
            background: white; 
            border-bottom: 1px solid #ddd; 
            transition: max-height 0.3s ease-out; 
            flex-shrink: 0;
        }
        .filters-panel.open { max-height: 600px; overflow-y: auto; }
        
        .filters-content { padding: 12px; }
        .filter-group { margin-bottom: 12px; }
        .filter-title { font-size: 11px; font-weight: bold; color: #333; margin-bottom: 6px; }
        .filter-buttons { display: grid; grid-template-columns: repeat(auto-fit, minmax(70px, 1fr)); gap: 4px; }
        .filter-btn { padding: 6px; border: 1px solid #ddd; background: white; border-radius: 4px; font-size: 11px; font-weight: 600; cursor: pointer; }
        .filter-btn.active { background: #1F4E78; color: white; border-color: #1F4E78; }
        
        .list-container { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 8px; }
        .contact { padding: 10px; background: white; margin-bottom: 6px; border-radius: 6px; border-left: 4px solid #ddd; cursor: pointer; }
        .contact:active { transform: scale(0.98); }
        .contact.not { border-left-color: #999; }
        .contact.contacted { border-left-color: #00B050; background: #f0f8f0; }
        .contact.whatsapp { border-left-color: #25D366; background: #f0fff0; }
        .contact.priority { border-left-color: #FFD700; background: #fffef0; }
        
        .contact-name { font-weight: 600; font-size: 14px; margin-bottom: 2px; }
        .contact-phone { font-size: 12px; color: #666; }
        .contact-status { display: inline-block; padding: 2px 6px; border-radius: 3px; font-size: 10px; font-weight: 600; background: #eee; color: #666; margin-top: 4px; }
        .status-contacted { background: #d4edda; color: #155724; }
        .status-whatsapp { background: #d4f4dd; color: #0a5f2a; }
        .contact-priority { margin-left: 6px; }
        
        .modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 100; align-items: flex-end; }
        .modal.active { display: flex; }
        .modal-content { background: white; width: 100%; max-height: 80vh; overflow-y: auto; border-radius: 16px 16px 0 0; padding: 16px; animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        
        .modal-title { font-size: 18px; font-weight: bold; margin-bottom: 12px; }
        .form-group { margin-bottom: 10px; }
        .form-label { display: block; font-weight: 600; font-size: 12px; margin-bottom: 4px; }
        .form-input { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px; font-size: 14px; }
        .form-input:focus { outline: none; border-color: #1F4E78; background: #f0f5ff; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; }
        .form-row input { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px; text-align: center; font-size: 13px; }
        
        .modal-buttons { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-top: 16px; }
        .modal-btn { padding: 10px; border: none; border-radius: 4px; font-weight: 600; cursor: pointer; font-size: 13px; }
        .btn-save { background: #00B050; color: white; grid-column: 2 / -1; }
        .btn-close { background: #ddd; color: #333; }
        .btn-delete { background: #d32f2f; color: white; display: none; }
        
        .empty { padding: 20px; text-align: center; color: #999; }
        
        #fileInput { display: none; }
        
        @media (max-width: 600px) {
            .button-row { grid-template-columns: 1fr 1fr; }
            .filter-buttons { grid-template-columns: repeat(3, 1fr); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 Tracker Candidatura</h1>
            <div class="header-info">
                💾 <span id="save-status">Inizializzazione...</span>
            </div>
            <div class="stats">
                <div class="stat-box">
                    <div class="stat-number" id="stat-total">0</div>
                    <div>Totali</div>
                </div>
                <div class="stat-box">
                    <div class="stat-number" id="stat-contacted">0</div>
                    <div>Contattati</div>
                </div>
                <div class="stat-box">
                    <div class="stat-number" id="stat-priority">0</div>
                    <div>⭐ Priority</div>
                </div>
                <div class="stat-box">
                    <div class="stat-number" id="stat-votes">0</div>
                    <div>👍 Voti</div>
                </div>
            </div>
        </div>

        <div class="toolbar">
            <input type="text" class="search-box" id="search" placeholder="🔍 Cerca...">
            
            <div class="button-row">
                <button class="btn btn-nuevo" onclick="openNewContact()">➕ Nuovo</button>
                <button class="btn btn-import" onclick="importCSV()">📥 Importa</button>
                <button class="btn btn-excel" onclick="exportCSV()">📊 Export</button>
                <button class="btn btn-filters" id="filter-toggle" onclick="toggleFilters()">⚙️ Filtri</button>
            </div>
        </div>

        <div class="filters-panel" id="filters-panel">
            <div class="filters-content">
                <div class="filter-group">
                    <div class="filter-title">📋 ORDINAMENTO</div>
                    <div class="filter-buttons">
                        <button class="filter-btn active" data-sort="cognome">Cognome</button>
                        <button class="filter-btn" data-sort="nome">Nome</button>
                        <button class="filter-btn" data-sort="stato">Stato</button>
                    </div>
                </div>

                <div class="filter-group">
                    <div class="filter-title">📞 STATO</div>
                    <div class="filter-buttons">
                        <button class="filter-btn active" data-filter="stato" data-value="all">Tutti</button>
                        <button class="filter-btn" data-filter="stato" data-value="no">❌ No</button>
                        <button class="filter-btn" data-filter="stato" data-value="si">✅ Sì</button>
                        <button class="filter-btn" data-filter="stato" data-value="chat">💬 Chat</button>
                    </div>
                </div>

                <div class="filter-group">
                    <div class="filter-title">⭐ PRIORITARI</div>
                    <div class="filter-buttons">
                        <button class="filter-btn active" data-filter="priority" data-value="all">Tutti</button>
                        <button class="filter-btn" data-filter="priority" data-value="si">⭐ Sì</button>
                        <button class="filter-btn" data-filter="priority" data-value="no">❌ No</button>
                    </div>
                </div>

                <div class="filter-group">
                    <div class="filter-title">☎️ DA RICHIAMARE</div>
                    <div class="filter-buttons">
                        <button class="filter-btn active" data-filter="recall" data-value="all">Tutti</button>
                        <button class="filter-btn" data-filter="recall" data-value="si">☎️ Sì</button>
                        <button class="filter-btn" data-filter="recall" data-value="no">❌ No</button>
                    </div>
                </div>

                <div class="filter-group">
                    <div class="filter-title">👤 VOTI PERSONALI</div>
                    <div class="filter-buttons">
                        <button class="filter-btn active" data-filter="pvotes" data-value="all">Tutti</button>
                        <button class="filter-btn" data-filter="pvotes" data-value="si">👍 Sì</button>
                        <button class="filter-btn" data-filter="pvotes" data-value="forse">❓ Forse</button>
                        <button class="filter-btn" data-filter="pvotes" data-value="no">👎 No</button>
                    </div>
                </div>

                <div class="filter-group">
                    <div class="filter-title">👥 VOTI TERZI</div>
                    <div class="filter-buttons">
                        <button class="filter-btn active" data-filter="tvotes" data-value="all">Tutti</button>
                        <button class="filter-btn" data-filter="tvotes" data-value="si">👍 Sì</button>
                        <button class="filter-btn" data-filter="tvotes" data-value="forse">❓ Forse</button>
                        <button class="filter-btn" data-filter="tvotes" data-value="no">👎 No</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="list-container" id="list"></div>
    </div>

    <div class="modal" id="modal">
        <div class="modal-content">
            <div class="modal-title" id="modal-title">Nuovo Contatto</div>
            
            <div class="form-group">
                <label class="form-label">Cognome</label>
                <input type="text" id="cognome" class="form-input">
            </div>

            <div class="form-group">
                <label class="form-label">Nome</label>
                <input type="text" id="nome" class="form-input">
            </div>

            <div class="form-group">
                <label class="form-label">Telefono</label>
                <input type="tel" id="telefono" class="form-input">
            </div>

            <div class="form-group">
                <label class="form-label">Stato</label>
                <select id="stato" class="form-input">
                    <option value="Non contattato">Non contattato</option>
                    <option value="Contattato">Contattato</option>
                    <option value="WhatsApp">WhatsApp</option>
                </select>
            </div>

            <div class="form-group">
                <label class="form-label">Voti Personali</label>
                <div class="form-row">
                    <input type="number" id="psi" placeholder="Sì" value="0" min="0">
                    <input type="number" id="pforse" placeholder="Forse" value="0" min="0">
                    <input type="number" id="pno" placeholder="No" value="0" min="0">
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">Voti Terzi</label>
                <div class="form-row">
                    <input type="number" id="tsi" placeholder="Sì" value="0" min="0">
                    <input type="number" id="tforse" placeholder="Forse" value="0" min="0">
                    <input type="number" id="tno" placeholder="No" value="0" min="0">
                </div>
            </div>

            <div class="form-group">
                <label style="display: flex; gap: 8px; align-items: center; cursor: pointer; font-size: 13px;">
                    <input type="checkbox" id="priority" style="width: 16px; height: 16px;">
                    <span>⭐ Prioritario</span>
                </label>
            </div>

            <div class="form-group">
                <label style="display: flex; gap: 8px; align-items: center; cursor: pointer; font-size: 13px;">
                    <input type="checkbox" id="recall" style="width: 16px; height: 16px;">
                    <span>☎️ Da Richiamare</span>
                </label>
            </div>

            <div class="modal-buttons">
                <button class="modal-btn btn-close" onclick="closeModal()">Chiudi</button>
                <button class="modal-btn btn-delete" id="delete-btn" onclick="deleteContact()">Elimina</button>
                <button class="modal-btn btn-save" onclick="saveContact()">Salva</button>
            </div>
        </div>
    </div>

    <input type="file" id="fileInput" accept=".csv,.xlsx,.xls">

    <script>
        let allContacts = [];
        let filters = { 
            search: '',
            stato: 'all',
            priority: 'all',
            recall: 'all',
            pvotes: 'all',
            tvotes: 'all',
            sort: 'cognome'
        };
        let currentEditId = null;

        // === LOCALSTORAGE ===
        const STORAGE_KEY = 'tracker_contacts_data';

        function saveToStorage() {
            try {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(allContacts));
                updateSaveStatus(`✅ Salvati ${allContacts.length} contatti`);
                console.log('✅ Dati salvati in localStorage');
            } catch (err) {
                console.error('Errore salvataggio:', err);
                updateSaveStatus('⚠️ Errore nel salvataggio');
            }
        }

        function loadFromStorage() {
            try {
                const stored = localStorage.getItem(STORAGE_KEY);
                if (stored) {
                    allContacts = JSON.parse(stored);
                    updateSaveStatus(`✅ Caricati ${allContacts.length} contatti`);
                    console.log(`✅ Caricati ${allContacts.length} contatti da localStorage`);
                    return true;
                }
            } catch (err) {
                console.error('Errore caricamento:', err);
            }
            return false;
        }

        function updateSaveStatus(msg) {
            document.getElementById('save-status').textContent = msg;
        }

        function parseCSV(text) {
            const lines = text.trim().split('\n');
            const headers = lines[0].split(';').map(h => h.trim());
            
            const newContacts = [];
            for (let i = 1; i < lines.length; i++) {
                if (!lines[i].trim()) continue;
                const values = lines[i].split(';').map(v => v.trim());
                
                const contact = {
                    id: `${Date.now()}_${i}_${Math.random()}`,
                    cognome: values[0] || '',
                    nome: values[1] || '',
                    telefono: values[2] || '',
                    stato: values[3] || 'Non contattato',
                    psi: parseInt(values[4]) || 0,
                    pforse: parseInt(values[5]) || 0,
                    pno: parseInt(values[6]) || 0,
                    tsi: parseInt(values[7]) || 0,
                    tforse: parseInt(values[8]) || 0,
                    tno: parseInt(values[9]) || 0,
                    priority: values[10] === 'Si' || values[10] === 'Sì',
                    recall: values[11] === 'Si' || values[11] === 'Sì'
                };
                
                if (contact.cognome || contact.nome) {
                    newContacts.push(contact);
                }
            }
            
            return newContacts;
        }

        function toggleFilters() {
            const panel = document.getElementById('filters-panel');
            const btn = document.getElementById('filter-toggle');
            panel.classList.toggle('open');
            btn.classList.toggle('active');
        }

        function importCSV() {
            document.getElementById('fileInput').click();
        }

        document.getElementById('fileInput').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            
            updateSaveStatus('📥 Importazione in corso...');
            
            const reader = new FileReader();
            reader.onload = (evt) => {
                try {
                    const newContacts = parseCSV(evt.target.result);
                    allContacts = allContacts.concat(newContacts);
                    saveToStorage();
                    render();
                    updateStats();
                    alert(`✅ Importati ${newContacts.length} contatti!`);
                } catch (err) {
                    console.error('Errore:', err);
                    alert('❌ Errore importazione');
                    updateSaveStatus('❌ Errore');
                }
            };
            reader.readAsText(file);
        });

        document.getElementById('search').addEventListener('input', (e) => {
            filters.search = e.target.value.toLowerCase();
            render();
        });

        document.querySelectorAll('[data-filter]').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const type = e.target.dataset.filter;
                const value = e.target.dataset.value;
                
                document.querySelectorAll(`[data-filter="${type}"]`).forEach(b => 
                    b.classList.remove('active'));
                e.target.classList.add('active');
                
                filters[type] = value;
                render();
            });
        });

        document.querySelectorAll('[data-sort]').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('[data-sort]').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                filters.sort = e.target.dataset.sort;
                render();
            });
        });

        function getFilteredList() {
            let list = [...allContacts];

            if (filters.search) {
                list = list.filter(c => 
                    c.cognome.toLowerCase().includes(filters.search) ||
                    c.nome.toLowerCase().includes(filters.search) ||
                    c.telefono.includes(filters.search)
                );
            }

            if (filters.stato !== 'all') {
                list = list.filter(c => {
                    if (filters.stato === 'no') return c.stato === 'Non contattato';
                    if (filters.stato === 'si') return c.stato === 'Contattato';
                    if (filters.stato === 'chat') return c.stato === 'WhatsApp';
                    return true;
                });
            }

            if (filters.priority !== 'all') {
                list = list.filter(c => 
                    filters.priority === 'si' ? c.priority : !c.priority
                );
            }

            if (filters.recall !== 'all') {
                list = list.filter(c => 
                    filters.recall === 'si' ? c.recall : !c.recall
                );
            }

            if (filters.pvotes !== 'all') {
                list = list.filter(c => {
                    if (filters.pvotes === 'si') return c.psi > 0;
                    if (filters.pvotes === 'forse') return c.pforse > 0;
                    if (filters.pvotes === 'no') return c.pno > 0;
                    return true;
                });
            }

            if (filters.tvotes !== 'all') {
                list = list.filter(c => {
                    if (filters.tvotes === 'si') return c.tsi > 0;
                    if (filters.tvotes === 'forse') return c.tforse > 0;
                    if (filters.tvotes === 'no') return c.tno > 0;
                    return true;
                });
            }

            list.sort((a, b) => {
                if (filters.sort === 'cognome') return a.cognome.localeCompare(b.cognome);
                if (filters.sort === 'nome') return a.nome.localeCompare(b.nome);
                if (filters.sort === 'stato') return a.stato.localeCompare(b.stato);
                return 0;
            });

            return list;
        }

        function render() {
            const list = getFilteredList();
            const html = list.map(c => {
                const statusClass = c.stato === 'Contattato' ? 'contacted' : c.stato === 'WhatsApp' ? 'whatsapp' : 'not';
                const statusLabel = c.stato === 'Non contattato' ? '❌ Non contattato' : 
                                   c.stato === 'Contattato' ? '✅ Contattato' : '💬 WhatsApp';
                
                return `
                    <div class="contact ${statusClass} ${c.priority ? 'priority' : ''}" onclick="editContact('${c.id}')">
                        <div class="contact-name">${c.cognome} ${c.nome}</div>
                        <div class="contact-phone">${c.telefono}</div>
                        <span class="contact-status ${c.stato === 'Contattato' ? 'status-contacted' : c.stato === 'WhatsApp' ? 'status-whatsapp' : ''}">${statusLabel}</span>
                        ${c.priority ? '<span class="contact-priority">⭐</span>' : ''}
                    </div>
                `;
            }).join('');

            document.getElementById('list').innerHTML = html || '<div class="empty">❌ Nessun contatto trovato</div>';
        }

        function updateStats() {
            const total = allContacts.length;
            const contacted = allContacts.filter(c => ['Contattato', 'WhatsApp'].includes(c.stato)).length;
            const priority = allContacts.filter(c => c.priority).length;
            const votes = allContacts.reduce((sum, c) => sum + c.psi + c.tsi, 0);

            document.getElementById('stat-total').textContent = total;
            document.getElementById('stat-contacted').textContent = contacted;
            document.getElementById('stat-priority').textContent = priority;
            document.getElementById('stat-votes').textContent = votes;
        }

        function openNewContact() {
            currentEditId = null;
            document.getElementById('modal-title').textContent = '➕ Nuovo Contatto';
            document.getElementById('delete-btn').style.display = 'none';
            document.getElementById('cognome').value = '';
            document.getElementById('nome').value = '';
            document.getElementById('telefono').value = '';
            document.getElementById('stato').value = 'Non contattato';
            document.getElementById('psi').value = '0';
            document.getElementById('pforse').value = '0';
            document.getElementById('pno').value = '0';
            document.getElementById('tsi').value = '0';
            document.getElementById('tforse').value = '0';
            document.getElementById('tno').value = '0';
            document.getElementById('priority').checked = false;
            document.getElementById('recall').checked = false;
            document.getElementById('modal').classList.add('active');
        }

        function editContact(id) {
            const contact = allContacts.find(c => c.id === id);
            if (!contact) return;
            
            currentEditId = id;
            document.getElementById('modal-title').textContent = `✏️ ${contact.cognome} ${contact.nome}`;
            document.getElementById('delete-btn').style.display = 'block';
            document.getElementById('cognome').value = contact.cognome;
            document.getElementById('nome').value = contact.nome;
            document.getElementById('telefono').value = contact.telefono;
            document.getElementById('stato').value = contact.stato;
            document.getElementById('psi').value = contact.psi;
            document.getElementById('pforse').value = contact.pforse;
            document.getElementById('pno').value = contact.pno;
            document.getElementById('tsi').value = contact.tsi;
            document.getElementById('tforse').value = contact.tforse;
            document.getElementById('tno').value = contact.tno;
            document.getElementById('priority').checked = contact.priority;
            document.getElementById('recall').checked = contact.recall;
            document.getElementById('modal').classList.add('active');
        }

        function saveContact() {
            const cognome = document.getElementById('cognome').value.trim();
            const nome = document.getElementById('nome').value.trim();

            if (!cognome && !nome) {
                alert('⚠️ Inserisci nome o cognome');
                return;
            }

            if (currentEditId) {
                const contact = allContacts.find(c => c.id === currentEditId);
                contact.cognome = cognome;
                contact.nome = nome;
                contact.telefono = document.getElementById('telefono').value;
                contact.stato = document.getElementById('stato').value;
                contact.psi = parseInt(document.getElementById('psi').value) || 0;
                contact.pforse = parseInt(document.getElementById('pforse').value) || 0;
                contact.pno = parseInt(document.getElementById('pno').value) || 0;
                contact.tsi = parseInt(document.getElementById('tsi').value) || 0;
                contact.tforse = parseInt(document.getElementById('tforse').value) || 0;
                contact.tno = parseInt(document.getElementById('tno').value) || 0;
                contact.priority = document.getElementById('priority').checked;
                contact.recall = document.getElementById('recall').checked;
            } else {
                allContacts.push({
                    id: `${Date.now()}_${Math.random()}`,
                    cognome,
                    nome,
                    telefono: document.getElementById('telefono').value,
                    stato: document.getElementById('stato').value,
                    psi: parseInt(document.getElementById('psi').value) || 0,
                    pforse: parseInt(document.getElementById('pforse').value) || 0,
                    pno: parseInt(document.getElementById('pno').value) || 0,
                    tsi: parseInt(document.getElementById('tsi').value) || 0,
                    tforse: parseInt(document.getElementById('tforse').value) || 0,
                    tno: parseInt(document.getElementById('tno').value) || 0,
                    priority: document.getElementById('priority').checked,
                    recall: document.getElementById('recall').checked
                });
            }

            saveToStorage();
            render();
            updateStats();
            closeModal();
        }

        function deleteContact() {
            if (!confirm('Eliminare?')) return;
            allContacts = allContacts.filter(c => c.id !== currentEditId);
            saveToStorage();
            render();
            updateStats();
            closeModal();
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('active');
        }

        function exportCSV() {
            try {
                let csv = 'Cognome;Nome;Telefono;Stato;Personale Si;Personale Forse;Personale No;Terzi Si;Terzi Forse;Terzi No;Prioritario;Da Richiamare\n';
                
                allContacts.forEach(c => {
                    csv += `"${c.cognome}";"${c.nome}";"${c.telefono}";"${c.stato}";${c.psi};${c.pforse};${c.pno};${c.tsi};${c.tforse};${c.tno};"${c.priority ? 'Si' : 'No'}";"${c.recall ? 'Si' : 'No'}"\n`;
                });

                const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
                const link = document.createElement('a');
                const url = URL.createObjectURL(blob);
                
                link.setAttribute('href', url);
                link.setAttribute('download', `tracker_${new Date().toISOString().split('T')[0]}.csv`);
                link.style.visibility = 'hidden';
                
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                
                updateSaveStatus('✅ CSV Esportato!');
            } catch (err) {
                console.error('Errore export:', err);
                updateSaveStatus('❌ Errore esportazione');
                alert('❌ Errore durante l\'esportazione');
            }
        }

        // === INIZIALIZZAZIONE ===
        function init() {
            updateSaveStatus('⏳ Caricamento...');
            const hasStored = loadFromStorage();
            
            if (!hasStored) {
                updateSaveStatus('✅ Pronto (nessun dato salvato)');
            }
            
            render();
            updateStats();
        }

        init();
    </script>
</body>
</html>
